
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#166534" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Matatu King Savannah Edition</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/616/616430.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        user-select: none;
        overflow: hidden;
        background-color: #166534; /* Fallback green */
      }
      
      /* Rotation Prompt */
      #rotate-prompt {
        display: none;
      }
      
      @media screen and (orientation: portrait) {
        #rotate-prompt {
          display: flex;
        }
        #root {
          display: none;
        }
      }

      /* Card Back Designs */
      .card-back-classic {
        background: radial-gradient(circle, #1e3a8a 20%, #1e40af 80%);
        border: 2px solid #dbeafe;
      }
      .card-back-uganda {
        background: repeating-linear-gradient(
          180deg,
          #000 0,
          #000 10px,
          #facc15 10px,
          #facc15 20px,
          #ef4444 20px,
          #ef4444 30px
        );
        border: 2px solid #fff;
      }
      .card-back-zebra {
        background: repeating-linear-gradient(
          45deg,
          #fff,
          #fff 10px,
          #000 10px,
          #000 20px
        );
        border: 2px solid #333;
      }
      .card-back-leopard {
        background-color: #fbbf24;
        background-image: radial-gradient(#000 15%, transparent 16%), radial-gradient(#000 15%, transparent 16%);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        border: 2px solid #92400e;
      }
      .card-back-kente {
        background: repeating-linear-gradient(
          90deg,
          #16a34a 0,
          #16a34a 10px,
          #facc15 10px,
          #facc15 20px,
          #ef4444 20px,
          #ef4444 30px,
          #000 30px,
          #000 40px
        );
        border: 2px solid #facc15;
      }

      /* Performance Optimized Animations */
      @keyframes enterFromTop {
        from { transform: translateY(-50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-enter-from-top {
        animation: enterFromTop 0.3s ease-out backwards;
      }

      @keyframes enterFromBottom {
        from { transform: translateY(50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-enter-from-bottom {
        animation: enterFromBottom 0.3s ease-out backwards;
      }

      @keyframes landOnPile {
        0% { transform: scale(1.2); opacity: 0.5; filter: brightness(1.5); }
        50% { transform: scale(0.95); opacity: 1; filter: brightness(1.2); box-shadow: 0 0 25px rgba(250, 204, 21, 0.6); }
        75% { transform: scale(1.02); }
        100% { transform: scale(1); filter: brightness(1); box-shadow: 0 0 0 rgba(0,0,0,0); }
      }
      .animate-land {
        animation: landOnPile 0.4s ease-out forwards;
      }

      @keyframes drawPulse {
        0% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(0.92); filter: brightness(1.2); box-shadow: 0 0 15px rgba(255,255,255,0.4); }
        100% { transform: scale(1); filter: brightness(1); }
      }
      .animate-draw-click {
        animation: drawPulse 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes computerThinking {
        0% { transform: translateY(0); }
        25% { transform: translateY(-12px); }
        50% { transform: translateY(0); }
        75% { transform: translateY(-6px); }
        100% { transform: translateY(0); }
      }
      .animate-computer-thinking {
        animation: computerThinking 2s ease-in-out infinite;
      }

      @keyframes popInSticker {
        0% { transform: scale(0) rotate(-20deg); opacity: 0; }
        50% { transform: scale(1.4) rotate(10deg); opacity: 1; }
        70% { transform: scale(0.9) rotate(-5deg); }
        100% { transform: scale(1) rotate(0); opacity: 1; }
      }
      .animate-pop-in {
        animation: popInSticker 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      
      @keyframes fadeOutSticker {
          0% { opacity: 1; transform: scale(1); }
          100% { opacity: 0; transform: scale(1.1); }
      }
      .animate-sticker-fade {
          animation: fadeOutSticker 0.3s ease-out forwards 2s; /* Delays fade out */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.32.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <!-- Landscape Prompt -->
    <div id="rotate-prompt" class="fixed inset-0 bg-green-900 z-[100] flex flex-col items-center justify-center text-white p-8 text-center">
      <div class="text-6xl mb-4 animate-bounce">📱</div>
      <h2 class="text-2xl font-bold mb-2">Please Rotate Your Device</h2>
      <p class="text-gray-300">Matatu King Savannah Edition is best played in landscape mode.</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
